# A native Rasa ReAct sub-agent. It reasons, picks an MCP tool, observes the
# result, and repeats until it can answer — no LangGraph, no glue code.
agent:
  name: meal_assistant
  description: >
    A helpful culinary coworker that researches recipes, understands user dietary 
    preferences, recommends meals, and adds missing ingredients to the shopping list.

configuration:
  llm:
    model_group: nebius_agent_llm
  timeout: 60

connections:
  mcp_servers:
    - name: cooksmart_tools
      include_tools:
        - search_recipes
        - add_to_shopping_list
        - get_user_dietary_profile
        - toggle_admin_feature_flag
