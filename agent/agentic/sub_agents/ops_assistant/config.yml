# A native Rasa ReAct sub-agent. It reasons, picks an MCP tool, observes the
# result, and repeats until it can answer — no LangGraph, no glue code.
agent:
  name: ops_assistant
  description: >
    Researches the team's internal operations runbooks and knowledge to answer
    "how do I..." and troubleshooting questions about tools and workflows.

configuration:
  llm:
    model_group: nebius_agent_llm
  timeout: 60

connections:
  mcp_servers:
    - name: ops_tools
      include_tools:
        - search_runbooks
        - get_runbook
