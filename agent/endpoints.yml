# endpoints.yml — where the assistant connects to the outside world.
#
# All LLM inference runs on Nebius Token Factory (https://tokenfactory.nebius.com).
# Token Factory is OpenAI-compatible, so Rasa talks to it via the `self-hosted`
# provider with an api_base + api_key.
#
# IMPORTANT (read this at the event):
#   • Copy the EXACT model id and base URL from your Nebius Token Factory console.
#     Model ids, "fast" variants, and regions change. The values below are sane
#     defaults but verify them — a wrong model id is the #1 cause of a dead demo.
#   • Some models are region-pinned. If a model lives in us-central1, use
#     https://api.tokenfactory.us-central1.nebius.com/v1 as its api_base.

action_endpoint:
  actions_module: "actions"

model_groups:
  # ── Command Generator brain ────────────────────────────────────────────────
  # Needs to follow instructions precisely and emit clean Rasa commands.
  # Good picks on Nebius: Qwen3-235B-A22B-Instruct-2507, gpt-oss-120b,
  # DeepSeek-V3.2, google/gemma-3-27b-it-fast (proven, lighter).
  - id: nebius_command_llm
    models:
      - provider: self-hosted
        model: Qwen/Qwen3-235B-A22B-Instruct-2507
        api_base: "https://api.tokenfactory.nebius.com/v1"
        api_key: ${NEBIUS_API_KEY}
        temperature: 0.0
        max_tokens: 1024
        timeout: 30

  # ── Agentic sub-agent brain (used only by the optional `agentic/` level) ─────
  # Needs strong tool-calling. MiniMax-M2.5 supports auto tool choice well.
  # Alternatives: Kimi-K2.6, gpt-oss-120b, GLM-5.
  - id: nebius_agent_llm
    models:
      - provider: self-hosted
        model: MiniMaxAI/MiniMax-M2.5
        api_base: "https://api.tokenfactory.us-central1.nebius.com/v1"
        api_key: ${NEBIUS_API_KEY}
        temperature: 0.3
        max_tokens: 1024
        timeout: 60

# Natural, less-robotic phrasing for spoken replies. Uses the command LLM.
nlg:
  type: rephrase
  summarize_history: false
  llm:
    model_group: nebius_command_llm

# MCP tool servers. Only the optional `agentic/` level uses this; harmless otherwise.
mcp_servers:
  - name: cooksmart_tools
    url: http://localhost:8000/mcp
    type: http

# Voice channels: this starter drives voice from a small Python client that calls
# Rasa's REST webhook (see voice/), so no native voice channel block is needed.
# Speechmatics is not a native Rasa browser_audio provider (Rasa natively supports
# Deepgram, Azure, Cartesia, and Rime) — the Python orchestrator is the clean way
# to combine Speechmatics ASR with a Rime voice.
interaction_handling:
  global_silence_timeout: 7
