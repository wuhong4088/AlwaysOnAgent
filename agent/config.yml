# config.yml — Rasa CALM pipeline for the Always-On AI Coworker starter.
#
# CALM (Conversational AI with Language Models) uses an LLM "Command Generator"
# to translate what the user says into structured commands (start a flow, fill a
# slot, correct a value, cancel, ...). The FlowPolicy then executes your flows.
#
# Docs: https://rasa.com/docs/

recipe: default.v1
language: en

# A stable id keeps event metadata consistent across `rasa train` runs.
assistant_id: rasa_coworker_hackathon_2026

pipeline:
  - name: CompactLLMCommandGenerator
    llm:
      # References a model_group defined in endpoints.yml (Nebius Token Factory).
      model_group: nebius_command_llm
    flow_retrieval:
      # Off for the starter: a handful of flows fit in the prompt, so we skip the
      # embedding step (one fewer API key to configure). Turn this on + add an
      # embeddings model_group once you have many flows. See README "Level up".
      active: false

policies:
  - name: FlowPolicy
